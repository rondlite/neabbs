id: markt
name:
  nl: "MARKT — vraag en aanbod"
  en: "MARKET — wanted and for sale"
area: public
min_level: 0
writable: true
messages:
  - id: 1
    author: "sysop"
    level: 0
    date: "02-05-26"
    subject:
      nl: "marktregels"
      en: "market rules"
    body:
      nl: |
        Bied aan, vraag, ruil. Prijzen in euro's (ja ja, ik weet het,
        guldens waren mooier). Geen gezeur achteraf, de sysop is geen
        geschillencommissie.
      en: |
        Offer, ask, trade. Prices in euros (yes yes, I know, guilders
        were nicer). No whining afterward, the sysop is not a
        disputes committee.
  - id: 2
    author: "msx_marco"
    level: 0
    date: "04-05-26"
    subject:
      nl: "AANGEBODEN: MSX-2 Philips NMS 8250"
      en: "FOR SALE: MSX-2 Philips NMS 8250"
    body:
      nl: |
        Z.g.a.n. (voor een machine van bijna 40 jaar). Met monitor, twee
        joysticks en een doos disks. Werkt allemaal. Weg wegens
        echtgenote. Bieden vanaf 150.
      en: |
        As good as new (for a machine nearly 40 years old). With monitor,
        two joysticks and a box of disks. All works. Must go because of
        the wife. Bidding starts at 150.
  - id: 3
    author: "soldeerbout"
    level: 0
    date: "05-05-26"
    subject:
      nl: "GEVRAAGD: 1200/75 baud modems, defect mag"
      en: "WANTED: 1200/75 baud modems, broken is fine"
    body:
      nl: |
        Voor de hobby. Hoe kapotter hoe leuker. Ook interesse in oude
        PTT-goedgekeurde exemplaren met dat groene stickertje.
      en: |
        For the hobby. The more broken the better. Also interested in old
        PTT-approved units with that little green sticker.
  - id: 4
    author: "wodan_86"
    level: 0
    date: "06-05-26"
    subject:
      nl: "AANGEBODEN: doos Elektuur jaargangen 82-88"
      en: "FOR SALE: box of Elektuur volumes 82-88"
    body:
      nl: |
        Compleet, wel wat koffiekringen. Ophalen in Amersfoort of ik
        neem ze mee naar de eerstvolgende retro-beurs. Gratis voor wie
        er echt wat mee doet.
      en: |
        Complete, some coffee rings. Pick up in Amersfoort or I'll
        bring them to the next retro fair. Free to whoever actually
        does something with them.
  - id: 5
    author: "mieke"
    level: 0
    date: "08-05-26"
    subject:
      nl: "GEVRAAGD: acoustic coupler"
      en: "WANTED: acoustic coupler"
    body:
      nl: |
        Voor een schoolproject over computergeschiedenis. Zo'n ding
        waar je de telefoonhoorn in legde. Mag stuk zijn, gaat om het
        laten zien.
      en: |
        For a school project about computer history. One of those things
        you laid the telephone handset into. Can be broken, it's just
        for showing.
  - id: 6
    author: "cpm_fan"
    level: 0
    date: "10-05-26"
    subject:
      nl: "AANGEBODEN: Osborne 1, 'draagbaar'"
      en: "FOR SALE: Osborne 1, 'portable'"
    body:
      nl: |
        Elf kilo optimisme uit 1982. Scherm van 5 inch, werkt. Inclusief
        originele tas met gescheurd handvat (logisch). 200 euro of ruilen
        tegen iets met een Z80 erin.
      en: |
        Eleven kilos of optimism from 1982. 5-inch screen, works. Includes
        original bag with a torn handle (naturally). 200 euros or trade
        for something with a Z80 in it.
  - id: 7
    author: "basicode"
    level: 0
    date: "11-05-26"
    subject:
      nl: "RUILEN: cassettes met software"
      en: "TRADE: cassettes with software"
    body:
      nl: |
        Doos vol C-60 cassettes, labels als "SPELLEN 3" en "NUTTIG?".
        Inhoud onbekend, avontuur gegarandeerd. Ruil tegen lege disks
        of een goed verhaal.
      en: |
        Box full of C-60 cassettes, labels like "GAMES 3" and "USEFUL?".
        Contents unknown, adventure guaranteed. Trade for blank disks
        or a good story.
