      zelf. de boards onthouden alles. het systeem ook.
  - id: 105
    author: "route66"
    level: 1
    date: "04-86"
    subject: "eerste stappen"
    body: |
      THIS-1 dus. mooi. onthoud: de meeste deuren hier hebben geen
      slot maar een vraag. het antwoord slingert bijna altijd ergens
      rond in een bestand of een bericht. lezen is de echte hack.
  - id: 106
    author: "de_specht"
    level: 0
    date: "04-86"
    subject: "de gemeente slaapt"
    grants_flag: "gemeente_pw"
    body: |
      voor de nieuwe die ergens moet beginnen: de gemeentelijke VAX
      (vax.gemeente.nl) draait 's nachts op een testaccount. het
      wachtwoord is al jaren "nachtdienst", want de beheerder daar
      is te lui om het te veranderen.

      scan, connect, crack. in die volgorde. en lees onderweg alles,
      want de volgende deur staat altijd in het vorige bestand.
  - id: 107
    author: "phantom"
    level: 2
    date: "05-86"
    subject: "wat de specht bedoelt"
    body: |
      personeel praat altijd. in kantines, op boards, in bestanden die
      "niet belangrijk" heten. de belangrijkste dingen staan in de
      saaiste bestanden. dat is geen toeval, dat is camouflage.
