# THIS BOARD — the first thing a new member sees. The iceberg must be felt
# from minute one: readable welcome + flavor at the bottom, 6-8 redacted
# high-level stubs above (some subjects tantalizingly visible, some blocked).
id: this-board
name:
  nl: "THIS BOARD"
  en: "THIS BOARD"
area: this
min_level: 0
writable: true
messages:
  - id: 101
    author: "beheerder"
    level: 0
    date: "03-86"
    subject:
      nl: "lees dit eerst"
      en: "read this first"
    body:
      nl: |
        welkom. geen namen, geen adressen, geen heldendaden op schrift.
        niveau krijg je van het systeem, niet van mij. het systeem let op
        wat je doet, niet op wat je vraagt.

        de rest van dit board lees je wanneer je het lezen mag.
      en: |
        welcome. no names, no addresses, no heroics in writing. level
        comes from the system, not from me. the system watches what you
        do, not what you ask.

        the rest of this board you read when you're allowed to read it.
  - id: 102
    author: "route66"
    level: 0
    date: "03-86"
    subject:
      nl: "voor de nieuwe"
      en: "for the new ones"
    body:
      nl: |
        iedereen begint op nul. iedereen. ook degene waar je nu tegenop
        kijkt. verschil zit in wie doorzet.
      en: |
        everyone starts at zero. everyone. even the one you look up to
        right now. the difference is in who keeps going.
  - id: 103
    author: "de_specht"
    level: 0
    date: "03-86"
    subject:
      nl: "gereedschap"
      en: "tools"
    body:
      nl: |
        de oude software doet het nog. begin met rondkijken voor je iets
        aanraakt: 'scan' laat zien wat er voor jouw niveau te zien is.
        meer dan dat laat het niet zien, en dat is het hele punt.
      en: |
        the old software still works. start by looking around before you
        touch anything: 'scan' shows what there is to see at your level.
        it won't show more than that, and that's the whole point.
  - id: 104
    author: "blueboxer"
    level: 0
    date: "04-86"
    subject:
      nl: "geduld"
      en: "patience"
    body:
      nl: |
        wie meteen overal aan zit, wordt gezien. wie eerst leest, ziet
        zelf. de boards onthouden alles. het systeem ook.
      en: |
        whoever grabs at everything right away gets seen. whoever reads
        first, sees for themselves. the boards remember everything. so
        does the system.
  - id: 105
    author: "route66"
    level: 1
    date: "04-86"
    subject:
      nl: "eerste stappen"
      en: "first steps"
    body:
      nl: |
        THIS-1 dus. mooi. onthoud: de meeste deuren hier hebben geen
        slot maar een vraag. het antwoord slingert bijna altijd ergens
        rond in een bestand of een bericht. lezen is de echte hack.
      en: |
        THIS-1 then. good. remember: most doors here don't have a lock,
        they have a question. the answer is almost always lying around
        somewhere in a file or a message. reading is the real hack.
  - id: 106
    author: "de_specht"
    level: 0
    date: "04-86"
    subject:
      nl: "de gemeente slaapt"
      en: "the city hall sleeps"
    grants_flag: "gemeente_pw"
    body:
      nl: |
        voor de nieuwe die ergens moet beginnen: de gemeentelijke VAX
        (vax.gemeente.nl) draait 's nachts op een testaccount. het
        wachtwoord is al jaren "nachtdienst", want de beheerder daar
        is te lui om het te veranderen.

        scan, connect, crack. in die volgorde. en lees onderweg alles,
        want de volgende deur staat altijd in het vorige bestand.
      en: |
        for the new one who has to start somewhere: the municipal VAX
        (vax.gemeente.nl) runs on a test account at night. the password
        has been "nachtdienst" for years, because the admin over there
        is too lazy to change it.

        scan, connect, crack. in that order. and read everything along
        the way, because the next door is always in the last file.
  - id: 107
    author: "phantom"
    level: 2
    date: "05-86"
    subject:
      nl: "wat de specht bedoelt"
      en: "what de_specht means"
    body:
      nl: |
        personeel praat altijd. in kantines, op boards, in bestanden die
        "niet belangrijk" heten. de belangrijkste dingen staan in de
        saaiste bestanden. dat is geen toeval, dat is camouflage.
      en: |
        staff always talk. in canteens, on boards, in files labeled
        "not important". the most important things are in the dullest
        files. that's no accident, that's camouflage.
  - id: 108
    author: "beheerder"
    level: 2
    date: "05-86"
    subject:
      nl: "huishoudelijk"
      en: "housekeeping"
    body:
      nl: |
        niveau 2 en hoger: jullie zien nu meer. dat betekent niet dat
        jullie alles moeten aanraken. wie een spoor achterlaat, ruimt
        het zelf op. wie dat niet kan, leert het hier.
      en: |
        level 2 and up: you see more now. that doesn't mean you have to
        touch everything. whoever leaves a trail, cleans it up
        themselves. whoever can't, learns it here.
