    grants_flag: "this_invite"
    body: |
      HERSTEL-LOGBOEK — BAND 7 (fragment, niet gearchiveerd)

      03:41  band 7 gemonteerd. label: "T.H.I.S."
      03:44  index leesbaar. sectie reageert op de oude aanroep.
      03:46  aanroep werkt nog vanaf het HOOFDMENU. gewoon de
             naam van de sectie intikken. vier letters. meer
             was het nooit.
      03:52  verzegeld zoals afgesproken. wie de aanroep kent
             én weet wat hij zoekt, vindt de deur toch wel.
      03:53  einde dienst. de nacht is van hen.
