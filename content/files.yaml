files:
  - name: "welkom.txt"
    date: "02-05-26"
    size: "1K"
    desc:
      nl: "Lees mij eerst"
      en: "Read me first"
    body:
      nl: |
        Welkom in de bestandensectie van NEABBS.

        Vroeger stonden hier programma's die u met XMODEM binnenhaalde
        en waar u vervolgens een avond mee bezig was omdat de laatste
        blokken corrupt waren. Tegenwoordig staan hier teksten. Lezen
        gaat sneller dan downloaden. Vooruitgang bestaat.

        -- de sysop
      en: |
        Welcome to the files section of NEABBS.

        This used to hold programs you pulled in over XMODEM and then
        spent an evening on because the last few blocks were corrupt.
        These days it holds texts. Reading is faster than downloading.
        Progress is real.

        -- the sysop

  - name: "modem-abc.txt"
    date: "03-05-26"
    size: "4K"
    desc:
      nl: "Modemhandleiding voor beginners (1984)"
      en: "Modem manual for beginners (1984)"
    body:
      nl: |
        HET MODEM-ABC (herdruk uit 1984)

        Een modem (MOdulator-DEModulator) zet computersignalen om in
        piepjes die door de telefoonlijn passen, en andersom.

        Snelheden door de jaren:
          300 baud   - rustig meelezen (begin jaren '80)
          1200 baud  - de standaard, 120 tekens per seconde
          2400 baud  - waar NEABBS tegenwoordig op opent
          9600 baud  - het snelste dat deze lijnen aan het eind van
                       de jaren '80 haalden. voor wie het durft.

        Tip van de redactie: sommige systemen accepteren een
        snelheids-verzoek gewoon als commando in het hoofdmenu. Gewoon
        de gewenste snelheid intikken. Brutalen hebben de halve wereld.

        Vergeet niet uw modem 's nachts uit te zetten. Uw telefoon-
        rekening dankt u.
      en: |
        THE MODEM ABC (reprint from 1984)

        A modem (MOdulator-DEModulator) turns computer signals into
        beeps that fit through the telephone line, and back again.

        Speeds over the years:
          300 baud   - reading along at leisure (early '80s)
          1200 baud  - the standard, 120 characters per second
          2400 baud  - what NEABBS opens on these days
          9600 baud  - the fastest these lines managed at the end of
                       the '80s. for those who dare.

        Tip from the editors: some systems accept a speed request
        simply as a command in the main menu. Just type in the desired
        speed. Fortune favors the bold.

        Don't forget to switch off your modem at night. Your phone
        bill thanks you.

  - name: "hayes-codes.txt"
    date: "03-05-26"
    size: "2K"
    desc:
      nl: "AT-commando's spiekbrief"
      en: "AT commands cheat sheet"
    body:
      nl: |
        HAYES AT-COMMANDO'S — SPIEKBRIEF

        ATDT 020-......   toon-kiezen (moderne centrales)
        ATDP 020-......   puls-kiezen (voor de oude wijken)
        ATA               opnemen
        ATH               ophangen (de vriendelijke manier)
        ATZ               reset (de wanhopige manier)
        +++               ontsnappen als alles vastzit

        NO CARRIER        het verdrietigste bericht dat bestaat
      en: |
        HAYES AT COMMANDS — CHEAT SHEET

        ATDT 020-......   tone dialing (modern exchanges)
        ATDP 020-......   pulse dialing (for the old neighborhoods)
        ATA               answer
        ATH               hang up (the friendly way)
        ATZ               reset (the desperate way)
        +++               escape when everything is stuck

        NO CARRIER        the saddest message there is

  - name: "netiquette.txt"
    date: "04-05-26"
    size: "2K"
    desc:
      nl: "Omgangsvormen op de lijnen (1985)"
      en: "Manners on the lines (1985)"
    body:
      nl: |
        NETIQUETTE VOOR BBS-GEBRUIKERS (1985)

        1. HOOFDLETTERS IS SCHREEUWEN. Doe het niet.
        2. Quote spaarzaam. Wij weten wat er hierboven stond.
        3. Een smiley :-) voorkomt tandartsbezoek.
        4. De sysop is een mens. Meestal.
        5. Bezet de lijn niet langer dan nodig; er wachten anderen.
           (Regel 5 is in 2026 minder urgent, maar principes zijn
           principes.)
      en: |
        NETIQUETTE FOR BBS USERS (1985)

        1. CAPITAL LETTERS IS SHOUTING. Don't do it.
        2. Quote sparingly. We know what was written above.
        3. A smiley :-) saves a trip to the dentist.
        4. The sysop is a human being. Usually.
        5. Don't hold the line longer than necessary; others are waiting.
           (Rule 5 is less urgent in 2026, but principles are
           principles.)

