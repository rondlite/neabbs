  - name: "zine-fragment.txt"
    date: "06-05-26"
    size: "3K"
    desc:
      nl: "Fragment uit 'De Draadloze' nr. 7 (1985)"
      en: "Fragment from 'De Draadloze' no. 7 (1985)"
    body:
      nl: |
        [fragment uit "De Draadloze", een elektronisch tijdschrift dat
         tussen 1984 en 1986 op verschillende systemen circuleerde.
         De rest van nummer 7 is verloren gegaan.]

        ...en dat is precies waarom een bulletin board meer is dan een
        antwoordapparaat met pretenties. Het is een PLEK. Wie inbelt,
        komt ergens BINNEN. De goede systemen voelen als een stamkroeg:
        je kent de stemmen, je kent de stamgasten, je weet welke kruk
        wiebelt.

        En zoals elke goede kroeg heeft elk goed systeem een achterkamer
        waar de kastelein zijn betere flessen bewaart. Maar daarover
        een andere keer, als de redactie durft...
      en: |
        [fragment from "De Draadloze", an electronic magazine that
         circulated on various systems between 1984 and 1986.
         The rest of issue 7 has been lost.]

        ...and that is exactly why a bulletin board is more than an
        answering machine with pretensions. It is a PLACE. Whoever dials
        in comes INSIDE somewhere. The good systems feel like a regulars'
        pub: you know the voices, you know the regulars, you know which
        stool wobbles.

        And like every good pub, every good system has a back room
        where the landlord keeps his better bottles. But more on that
        another time, if the editors dare...

  - name: "ptt-brief.txt"
    date: "07-05-26"
    size: "1K"
    desc:
      nl: "Brief van de PTT (1985, ingelijst)"
      en: "Letter from the PTT (1985, framed)"
    body:
      nl: |
        [afschrift, origineel hangt ingelijst boven de machine]

        's-Gravenhage, 14 augustus 1985

        Geachte heer,

        Naar aanleiding van uw aanvraag betreffende uitbreiding van het
        aantal telefoonaansluitingen op uw adres delen wij u mede dat
        levering van 8 (acht) additionele lijnen is voorzien in het
        vierde kwartaal. Wij vertrouwen erop u hiermede voldoende te
        hebben geinformeerd.

        Hoogachtend,
        Staatsbedrijf der PTT

        [aantekening in balpen: "beloofd is beloofd. nog steeds niks.
         - okt '85"]
      en: |
        [transcript, original hangs framed above the machine]

        's-Gravenhage, 14 August 1985

        Dear Sir,

        In response to your application concerning an expansion of the
        number of telephone connections at your address, we inform you
        that delivery of 8 (eight) additional lines is foreseen in the
        fourth quarter. We trust we have hereby informed you
        sufficiently.

        Respectfully,
        State Enterprise of the PTT

        [note in ballpoint: "a promise is a promise. still nothing.
         - oct '85"]

  - name: "msx-tips.txt"
    date: "08-05-26"
    size: "2K"
    desc:
      nl: "MSX-tips van marco"
      en: "MSX tips from marco"
    body:
      nl: |
        MSX-TIPS — verzameld door msx_marco

        * POKE-1,170 op een MSX-2: niet doen. U bent gewaarschuwd.
        * Diskdrive-riempjes: elastiekjes van de groenteboer werken
          precies drie weken.
        * CALL SYSTEM brengt u terug naar DOS, CTRL+STOP redt u uit
          bijna alles. Bijna.
        * Een cassette die niet laadt: volume op 7, toon op maximaal,
          en bidden tot de god van de magneetkoppen.
      en: |
        MSX TIPS — collected by msx_marco

        * POKE-1,170 on an MSX-2: don't do it. You have been warned.
        * Disk drive belts: rubber bands from the greengrocer work
          for exactly three weeks.
        * CALL SYSTEM takes you back to DOS, CTRL+STOP saves you from
          almost anything. Almost.
        * A cassette that won't load: volume on 7, treble on maximum,
          and pray to the god of magnetic heads.

