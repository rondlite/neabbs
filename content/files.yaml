    body:
      nl: |
        NOTITIES BIJ HET HERSTEL — NIET PUBLICEREN

        - banden 1 t/m 6: leesbaar. boards en bestanden terug.
        - band 7: de oude sectie. NIET aangesloten. na wat er in
          maart '86 gebeurd is blijft die verzegeld. geen discussie.
        - wachtwoordbestand: waardeloos (goed zo).
        - phantom belde in de laatste nacht nog. als die naam ooit
          weer op een board verschijnt wil ik het WETEN.

        todo: dit bestand NIET in de publieke lijst zetten
        todo: koffie
      en: |
        NOTES ON THE RECOVERY — DO NOT PUBLISH

        - tapes 1 through 6: readable. boards and files are back.
        - tape 7: the old section. NOT connected. after what happened
          in march '86 it stays sealed. no discussion.
        - password file: worthless (good thing too).
        - phantom dialed in on the last night. if that name ever
          shows up on a board again I want to KNOW about it.

        todo: do NOT put this file in the public list
        todo: coffee

  - name: "kroniek-1.txt"
    date: "10-05-26"
    size: "2K"
    desc:
      nl: "Kroniek van NEABBS (deel 1, uit de banden)"
      en: "Chronicle of NEABBS (part 1, from the tapes)"
    body:
      nl: |
        KRONIEK VAN NEABBS — DEEL 1 (gereconstrueerd uit de banden)

        november 1984. De machine draaide in een kelder, naast de cv.
        Vier lijnen, elke avond vol. Wachtrijen vanaf acht uur.

        Het bleef niet bij vier lijnen. De PTT beloofde uitbreiding en
        liet op zich wachten; het board groeide toch, lijn na lijn, tot
        de vierentwintig waar het om bekend werd.

        Wat bleef hangen was de sfeer op de boards. Mensen die elkaar
        nooit gezien hadden maakten hier ruzie en legden het weer bij,
        allemaal op 120 tekens per seconde.

        (deel 2 volgt zodra de volgende band leesbaar is)
      en: |
        CHRONICLE OF NEABBS — PART 1 (reconstructed from the tapes)

        november 1984. The machine ran in a cellar, next to the boiler.
        Four lines, full every evening. Queues from eight o'clock on.

        It didn't stop at four lines. The PTT promised expansion and
        kept everyone waiting; the board grew anyway, line by line, to
        the twenty-four it became known for.

        What stayed with people was the atmosphere on the boards. People
        who had never met each other picked fights here and made up
        again, all at 120 characters per second.

        (part 2 follows as soon as the next tape is readable)

  - name: "toekomst-1986.txt"
    date: "11-05-26"
    size: "2K"
    desc:
      nl: "Voorspellingen over 'de toekomst' (1986)"
      en: "Predictions about 'the future' (1986)"
    body:
      nl: |
        HOE ZIET 2026 ERUIT? — voorspellingen van onze bellers (1986)

        turbo_ted:  "Modems van 9600 baud. Schrijf het op."
        mainframe:  "Iedereen een computer in zijn broekzak, en
                     niemand meer die weet hoe het werkt."
        zilvervis:  "De PTT bestaat niet meer. Iets moet die lijnen
                     toch opgeleverd hebben."
        kermit:     "BBS'en zijn dan musea. Mensen betalen om te
                     kijken hoe wij nu leven."
        de_krab:    "Alles wordt sneller en niemand wordt geduldiger."

        [red.: wie in 2026 dit leest mag de winnaar aanwijzen op het
         board ALGEMEEN]
      en: |
        WHAT WILL 2026 LOOK LIKE? — predictions from our callers (1986)

        turbo_ted:  "9600 baud modems. Write it down."
        mainframe:  "Everyone with a computer in their pocket, and
                     nobody left who knows how it works."
        zilvervis:  "The PTT no longer exists. Something must have
                     delivered those lines after all."
        kermit:     "BBSes will be museums by then. People pay to
                     watch how we live now."
        de_krab:    "Everything gets faster and nobody gets more patient."

        [ed.: whoever reads this in 2026 may name the winner on the
         board GENERAL]

  # ── discovery chain, beat 3: appears once phantom's spoor is gevolgd ──
  - name: "herstel-log.txt"
    date: "12-05-26"
    size: "1K"
    desc:
      nl: "logboek band 7 (fragment)"
      en: "logbook tape 7 (fragment)"
    requires_flag: "phantom_spoor"
    grants_flag: "this_invite"
    body:
      nl: |
        HERSTEL-LOGBOEK — BAND 7 (fragment, niet gearchiveerd)

        03:41  band 7 gemonteerd. label: "T.H.I.S."
        03:44  index leesbaar. sectie reageert op de oude aanroep.
        03:46  aanroep werkt nog vanaf het HOOFDMENU. gewoon de
               naam van de sectie intikken. vier letters. meer
               was het nooit.
        03:52  verzegeld zoals afgesproken. wie de aanroep kent
               én weet wat hij zoekt, vindt de deur toch wel.
        03:53  einde dienst. de nacht is van hen.
      en: |
        RECOVERY LOGBOOK — TAPE 7 (fragment, not archived)

        03:41  tape 7 mounted. label: "T.H.I.S."
        03:44  index readable. section responds to the old call.
        03:46  the call still works from the MAIN MENU. just type
               the name of the section. four letters. that's all
               it ever was.
        03:52  sealed as agreed. whoever knows the call and knows
               what they're looking for will find the door anyway.
        03:53  end of shift. the night is theirs.
